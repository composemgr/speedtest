# nginx proxy address - http://172.17.0.1:8102

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  speedtest:
    image: speedtest/speedtest:latest
    container_name: speedtest-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - speedtest
    ports:
      - "8102:8102"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/speedtest:/config
      - ./volumes/data/speedtest:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  speedtest:
    external: false
